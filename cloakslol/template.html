<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autocape - </title>
    <link rel="icon" type="image/x-icon" href="https://slashonline.net/media/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        body{
            background: linear-gradient(73deg, #04031A 0%, #050242 100%);
            margin: 0px;
            font-family: poppins;
        }
        .headder {
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.00) 100%), rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            height: 100px;
            

        }
        .logo {
            margin-top: 20px;
            height: 100%;
            display: inline-block;
            margin-left: calc(50vw - 190px);
        }
        .goback {
            position: absolute;
            top: 40px;
            height: 100%;
            display: flex;
            gap: 0px;
            margin-left: 20px;
            color: rgba(255, 255, 255, 0.39);
            user-select: none;
            cursor: pointer;
        }
        .textgoback {
            display: inline-block;
            margin-left: 40px;
            
            font-size: 15px;
        }
        .arrowgoback{
            margin-left: 10px;
        }
        .content{
            margin-top: 20px;
            margin-left: 10px;
            margin-right: 10px;
            margin-bottom: 10px;
            border-radius: 17px;
            
            height: calc(100vh - 140px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px);
        }
    </style>
</head>
<body>
    <div class="headder">
        <div class="goback">
            <div class="arrowgoback">
                <svg xmlns="http://www.w3.org/2000/svg" width="9" height="16" viewBox="0 0 9 16" fill="none">
                    <path d="M0.360901 7.29289C-0.029623 7.68342 -0.029623 8.31658 0.360901 8.70711L6.72486 15.0711C7.11539 15.4616 7.74855 15.4616 8.13908 15.0711C8.5296 14.6805 8.5296 14.0474 8.13908 13.6569L2.48222 8L8.13908 2.34315C8.5296 1.95262 8.5296 1.31946 8.13908 0.928932C7.74855 0.538408 7.11539 0.538408 6.72486 0.928932L0.360901 7.29289ZM2.0694 7H1.06801L1.06801 9H2.0694V7Z" fill="white" fill-opacity="0.39"/>
                  </svg>

            </div>
            <div class="textgoback">
                Go Back
            </div>
        </div>
        <div class="logo">
            <img src="https://dev.cloaks.lol/media/A1GWF2Gn7Hv8aRWuqjDasGSB31693008466077/5p8rLGmPAg.png" alt="Cloaks.lol Logo" height="56">
        </div>
        <div class="account">
            
        </div>
    </div>
    <div class="content">

    </div>
</body>
</html>
