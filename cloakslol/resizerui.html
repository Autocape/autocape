    <script>
        gobackbtn = document.getElementsByClassName("goback")[0];
        gobackbtn.addEventListener('click', () => {
            window.location.href = "/";
        });
    </script>
    <script>
        var countdown = 0;
        var isrendered = false;
        var isrenderingrn = false;
        var skippedframes = 0;
        var renderingenbaled = true;

        var image = document.getElementById('imagh');
        var colpop = document.getElementById('colpop');
        var popuppickprevimg = document.getElementById('popuppickprevimg');
         const queryString = window.location.search;
        const urlParams = new URLSearchParams(queryString);
        const imgsa = urlParams.get('img');
        const stateid = urlParams.get('stateid');
        var isstate = false;
        const loadingcontainer = document.getElementById('loadingoverlay');
        const pcrapp = document.getElementsByClassName('pcr-app')[0];

        const donebtn = document.getElementsByClassName('donebtn')[0];
        var doneclicked = false;

        var selectedmatchmode = "automatic";

        const automaticcolourpickerselect = document.getElementById('automaticcolourpickerselect');
        const customcolourpickerselect = document.getElementById('customcolourpickerselect');

        automaticcolourpickerselect.addEventListener('click', () => {
            selectedmatchmode = "automatic";
            automaticcolourpickerselect.classList.add('colpickselenabled');
            customcolourpickerselect.classList.remove('colpickselenabled');
        });

        customcolourpickerselect.addEventListener('click', () => {
            selectedmatchmode = "custom";
            automaticcolourpickerselect.classList.remove('colpickselenabled');
            customcolourpickerselect.classList.add('colpickselenabled');
        });


        donebtn.addEventListener("click", function(){
            if (doneclicked == true) {
                return;
            }
            donebtn.innerHTML = '<img src="https://raw.githubusercontent.com/n3r4zzurr0/svg-spinners/main/preview/90-ring-white-36.svg" height="30px"></img>';
            donebtn.disabled = true;
            doneclicked = true;
            


            if (selectedmatchmode == "automatic") {
                colourmatch = "true";
            } else {
                colourmatch = "custom&customcolour=" + document.getElementById('customcolourpicker').value.replace("#", "");
            }
            canvass = cropper.getCroppedCanvas();
                            canvass.toBlob(function(blob) {
                                var xhr = new XMLHttpRequest();
                            xhr.open("POST", "https://media.cloaks.lol/upload", true);
                            FormDatas = new FormData();
                            FormDatas.append("file", blob, "img.png");
                            xhr.send(FormDatas);
                            xhr.onreadystatechange = function() {
                                if (xhr.readyState == 4 && xhr.status == 200) {
                                    console.log(xhr.responseText);
                                    jsonsa = JSON.parse(xhr.responseText);
                                    console.log(jsonsa.path);
                                    if (isstate == true) {
                                       const idxhr = new XMLHttpRequest();
                                        idxhr.open("GET", "/makecape?fromeditor=true&stateid="+ stateid +"&colourmatch=" + colourmatch + "&img=https://media.autocape.app/media/" + jsonsa.path, true);
                                        idxhr.send();
                                        idxhr.onreadystatechange = function() {
                                            if (idxhr.readyState == 4 && idxhr.status == 200) {
                                                console.log(idxhr.responseText);
                                                const resultjson = JSON.parse(idxhr.responseText);
                                                if (resultjson.resultid != null) {
                                                    window.location.href = "/result/" + resultjson.resultid;
                                                }
                                            }
                                        }
                                        
                                    } else {
                                       const idxhr = new XMLHttpRequest();
                                        idxhr.open("GET", "/makecape?fromeditor=true&colourmatch=" + colourmatch + "&img=https://media.autocape.app/media/" + jsonsa.path, true);
                                        idxhr.send();
                                        idxhr.onreadystatechange = function() {
                                            if (idxhr.readyState == 4 && idxhr.status == 200) {
                                                console.log(idxhr.responseText);
                                                const resultjson = JSON.parse(idxhr.responseText);
                                                if (resultjson.resultid != null) {
                                                    window.location.href = "/result/" + resultjson.resultid;
                                                }
                                            }
                                        }
                                    }
                                }
                                if (xhr.readyState == 4 && xhr.status != 200) {
                                    console.log(xhr.responseText);
                                    alert("it appears like that the processed file exceeds the 3mb limit, please try again with a smaller file or if you are unsure what to do join the support server!");
                                    donebutton.innerHTML = 'error';
                                    donebutton.disabled = true;
                                }
                            }
                            });
                            
        })



        

         
        
        
       
        function resizedwindow() {
            var calcedwith = livepreviewdiv.offsetWidth;
            var calcedheight = livepreviewdiv.offsetWidth;
            livepreviewdiv.height = calcedheight;
            skinViewer.width = calcedwith;
            skinViewer.height = calcedheight;
        }

        window.addEventListener('resize', resizedwindow);

        function doneloading() {
            
            
            loadingcontainer.style.animation = "fadeout 100ms ease-in-out forwards";
            setTimeout(() => {
                loadingcontainer.style.visibility = "hidden";
            }, 110);
        }

        
        


        if (stateid != null) {
            isstate = true;
        }

        // if (imgsa == null) {
        //     window.location.href = "https://dev.cloaks.lol/autocape";
        // }


        image.src = imgsa;

        var cropper = new Cropper(image, {
            aspectRatio: 5 / 8,
            crop(event) {
                
                
              
                widths = event.detail.width;
                
                heights = event.detail.height;
                
                
                countdown = 1;
                isrendered = false;
            },
        });
        var canvas = document.createElement('canvas');

        canvas.width = 2048;
        canvas.height = 1024;
        var ctx = canvas.getContext('2d');

        //get template from url and draw it on canvas
        var image = new Image();
        image.crossOrigin = "Anonymous";
        image.src = "https://autocape.app/media/previews/previewtexture.png";

        image.onload = function() {
            ctx.drawImage(image, 0, 0, 2048, 1024);

            
        }

        


        function renderpreviewcapefile() {
            if (isrendered == false) {
                if (countdown == 0 ) {
                    if (isrenderingrn == false) {
                        
                    isrenderingrn = true
                    console.log("rendering");
                    isrendered = true;
                    canvass = cropper.getCroppedCanvas();
                    try {
                canvass.toBlob(function(blob) {
                //draw the image on the canvas
                var img = new Image();
                imgsourceurl = URL.createObjectURL(blob);
                img.src = imgsourceurl;
                
                img.onload = function() {
                    // first draw the space where the image would go black
                    ctx.fillStyle = "black";
                    ctx.fillRect(32, 32, 320, 512);
                    // then draw the image
                    ctx.drawImage(img, 32, 32, 320, 512);
                    //set canvas as cape for the preview render
                    canvas.toBlob(function(blob) {
                    bloburl = URL.createObjectURL(blob);
                    skinViewer.loadCape(bloburl);
                    console.log("completed:00");
                    isrenderingrn = false;
                    skippedframes = 0;
                    doneloading();
                    //clean up
                    
                    try {
                        URL.revokeObjectURL(imgsourceurl);
                    } catch (error) {
                        console.log(error);
                    }
                    
                    img = null;

                    
                    
                    
                    
                }, 'image/png');
                    
                    
                }
                })
            } catch (error) {
                console.log(error);
                isrenderingrn = false;
            }
                
            }
            else
            {
                console.log("rendering... skipping frame");
                skippedframes = skippedframes + 1;
            }
                }
                else
                {
                    countdown = countdown - 1;
                }
            }
            
        }

        setInterval(() => {
            if (renderingenbaled == true) {
                
            
            if (skippedframes < 10) {
                renderpreviewcapefile();
                
            }
            else
            {
                disablerendering();
            }
        }
        }, 100);
        const livepreviewdiv = document.getElementsByClassName("livepreview")[0];
        const skincontainer = document.getElementById("skin_container");


        function disablerendering(reason) {
            isrendered = true;
            renderingenbaled = false;
            console.log("disabling rendering");
            //delete canvas
            canvas = null;
            //delete skincontainer
            skincontainer.remove();
            
        }

        
        

        const calcedwith = livepreviewdiv.offsetWidth;
        const calcedheight = livepreviewdiv.offsetWidth;

        livepreviewdiv.height = calcedheight;

        let skinViewer = new skinview3d.SkinViewer({
		canvas: document.getElementById("skin_container"),
        width: calcedwith,
        height: calcedheight,
		skin: "https://mineskin.eu/skin/Felixmax_"
	});
        skinViewer.camera.rotation.z = -3
        skinViewer.camera.rotation.y = 0
        skinViewer.camera.rotation.x = -2
        skinViewer.camera.position.z = -33
        skinViewer.camera.position.y = 8
        skinViewer.camera.position.x = -1
        skinViewer.fov = 65;
        
        skinViewer.animation = new skinview3d.IdleAnimation();



        // if s key is pressed
        document.addEventListener('keydown', function(event) {
            if (event.keyCode == 83) {
                var script=document.createElement('script');script.onload=function(){var stats=new Stats();document.body.appendChild(stats.dom);requestAnimationFrame(function loop(){stats.update();requestAnimationFrame(loop)});};script.src='https://mrdoob.github.io/stats.js/build/stats.min.js';document.head.appendChild(script);
            }
            if (event.keyCode == 80) {
                            document.body.style.background = "pink";
                            alert("femboy mode activated")
                        }
        });

        
    

    
    </script>
</body>
