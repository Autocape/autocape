<body class="min-h-screen flex flex-col bg-linear-to-br from-[#04031A] to-[#050242] m-0 font-sans select-none">

        <div class="absolute top-4 sm:top-10 left-5 hidden text-white/40 select-none cursor-pointer">

        </div>
        <div class="mx-auto">
            <img
                src="https://media.autocape.app/media/n7leGMmIzGlOloDzB4X580ECB1783358474181/iGZHfHlfNs3376.png"

    <div class="sm:m-8 h-full mx-5 rounded-[17px] sm:flex-1 bg-transparent flex flex-col overflow-hidden max-sm:justify-start gap-8">
        <!-- drop zone and file selector -->
        <div class="dropzone" ondrop="dropHandler(event);">
            <div class="hidden sm:flex flex-col items-center justify-center gap-4 rounded-[17px] border border-white/15 bg-white/4 backdrop-blur-xl text-[#12AEE8] sm:h-[60vh] h-48 text-3xl font-semibold text-center hover:file:scale-99 transition-all" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-drag-drop upload-drop-glow"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M19 11v-2a2 2 0 0 0 -2 -2h-8a2 2 0 0 0 -2 2v8a2 2 0 0 0 2 2h2" /><path d="M13 13l9 3l-4 2l-2 4l-3 -9" /><path d="M3 3l0 .01" /><path d="M7 3l0 .01" /><path d="M11 3l0 .01" /><path d="M15 3l0 .01" /><path d="M3 7l0 .01" /><path d="M3 11l0 .01" /><path d="M3 15l0 .01" /></svg>
                <div class="upload-text-glow">Drop your image here</div>
            </div>
        </div>

        <label
            id="uisw"
            class="dropzonebutton rounded-[17px] border border-white/15 bg-white/4 backdrop-blur-xl text-white/40 text-lg font-semibold w-full flex flex-col gap-2 items-center justify-center py-6 h-[85vh] sm:flex-1 box-border cursor-pointer hover:scale-99 transition-all"
        >
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-cloud-upload text-neutral-500 sm:h-8"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M7 18a4.6 4.4 0 0 1 0 -9a5 4.5 0 0 1 11 2h1a3.5 3.5 0 0 1 0 7h-1" /><path d="M9 15l3 -3l3 3" /><path d="M12 12l0 9" /></svg>
            <div id="uploadingtext" class="flex items-center justify-center flex-col text-neutral-500">
                Click here to
                <div class="upload-text-glow text-[#11BCF8] text-lg font-semibold">UPLOAD</div>
            </div>
            <input id="selectors" class="hidden" type="file" accept="image/png, image/jpeg">
        </label>
    </div>

    <script>
        const dropzonecontent = document.querySelector('.dropzone');
        const dropzonebutton = document.querySelector('.dropzonebutton');
        const uist = document.getElementById('uploadingtext');
        const inputElement = document.getElementById('selectors');

        dropzonecontent.addEventListener('dragover', function (e) {
            e.preventDefault();
        }, false);

        function dropHandler(ev) {
            console.log('File(s) dropped into dropzone!');
            ev.preventDefault();

            if (ev.dataTransfer.items) {
                [...ev.dataTransfer.items].forEach((item, i) => {
                    if (item.kind === 'file') {
                        const file = item.getAsFile();
                        console.log(`… file[${i}].name = ${file.name}`);
                        const fileList = file;
                        console.log(fileList);

                        if (fileList.size > 3000000) {
                            uist.style.visibility = 'visible';
                            uist.innerHTML = 'File is too big! (Max 3MB)';
                            uist.style.color = 'red';
                            uist.classList.add('animate-pulse');
                            return;
                        }

                        if (fileList.type == 'image/png' || fileList.type == 'image/jpeg') {
                            bombimage = fileList;
                        } else {
                            uist.style.visibility = 'visible';
                            uistb.style.visibility = 'visible';
                            uist.innerHTML = 'File is not a png or jpg!';
                            uist.style.color = 'red';
                            uist.classList.add('animate-pulse');
                            return;
                        }

                        var formData = new FormData();
                        formData.append('file', fileList);
                        var request = new XMLHttpRequest();
                        request.open('POST', 'https://media.autocape.app/upload');
                        console.log(formData);
                        request.send(formData);
                        request.onreadystatechange = function () {
                            if (this.readyState == 4 && this.status == 200) {
                                var response = JSON.parse(this.responseText);
                                var path = response.path;
                                uist.style.visibility = 'visible';
                                uist.innerHTML = 'Success!';
                                uist.style.color = 'green';
                                uist.classList.remove('animate-pulse');
                                window.location.href = '/resize?img=' + 'https://media.autocape.app/media/' + path;
                            } else if (this.readyState == 4 && this.status == 429) {
                                uist.style.visibility = 'visible';
                                uist.innerHTML = 'Error! you are being ratelimited!';
                                uist.style.color = 'red';
                                uist.classList.add('animate-pulse');
                            } else if (this.readyState == 4 && this.status == 500) {
                                uist.style.visibility = 'visible';
                                uist.innerHTML = 'Error! ' + this.responseText;
                                uist.style.color = 'red';
                                uist.classList.add('animate-pulse');
                            }
                        };
                    }
                });
            } else {
                [...ev.dataTransfer.files].forEach((file, i) => {
                    console.log(`… file[${i}].name = ${file.name}`);
                });
            }
        }

        inputElement.addEventListener('change', handleFiles, false);

        function handleFiles() {
            const fileList = this.files;
            console.log(fileList);
            uist.style.visibility = 'visible';
            uist.innerHTML = 'Uploading...';
            uist.style.color = 'white';

            if (fileList.length == 0) {
                uist.innerHTML = 'No file selected!';
                uist.style.color = 'red';
                uist.classList.add('animate-pulse');
                return;
            }

            if (fileList[0].size > 3000000) {
                uist.innerHTML = 'File is too big! (Max 3MB)';
                uist.style.color = 'red';
                uist.classList.add('animate-pulse');
                return;
            }

            if (fileList[0].type == 'image/png' || fileList[0].type == 'image/jpeg') {
                bombimage = fileList[0];
            } else {
                uist.style.visibility = 'visible';
                uistb.style.visibility = 'visible';
                uist.innerHTML = 'File is not a png or jpg!';
                uist.style.color = 'red';
                uist.classList.add('animate-pulse');
                return;
            }

            var formData = new FormData();
            formData.append('file', fileList[0]);
            var request = new XMLHttpRequest();
            request.open('POST', 'https://media.autocape.app/upload');
            console.log(formData);
            request.send(formData);
            request.onreadystatechange = function () {
                if (this.readyState == 4 && this.status == 200) {
                    var response = JSON.parse(this.responseText);
                    var path = response.path;
                    uist.style.visibility = 'visible';
                    uist.innerHTML = 'Success!';
                    uist.style.color = 'green';
                    uist.classList.remove('animate-pulse');
                    window.location.href = '/resize?img=' + 'https://media.autocape.app/media/' + path;
                } else if (this.readyState == 4 && this.status == 429) {
                    uist.style.visibility = 'visible';
                    uist.innerHTML = 'Error! you are being ratelimited!';
                    uist.style.color = 'red';
                    uist.classList.add('animate-pulse');
                } else if (this.readyState == 4 && this.status == 500) {
                    uist.style.visibility = 'visible';
                    uist.innerHTML = 'Error! ' + this.responseText;
                    uist.style.color = 'red';
                    uist.classList.add('animate-pulse');
                }
            };
        }
    </script>

    <script>

    <script>
        // (C) Felixmax_ 2023
        var lang = navigator.language || navigator.userLanguage;
        var pageid = '0';
        var translationjson = {};

        function localizecontent(divid) {
            var div = document.getElementById(divid);
            if (div == null) {
                console.log('%c[localize.js] Error: localizecontent() could not find element with id ' + divid, 'color: red;');
            }
            if (translationjson == {}) {
                console.log('%c[localize.js] Error: localizecontent() could not find translation data. probaply because plugin was never initialized! ', 'color: red;');
            }
        }

        function initlocalize(pageident) {
            console.log('%c[localize.js] Initializing localization for page ' + pageident + ' in language ' + lang + '...', 'color: blue;');
            pageid = pageident;
            var xhr = new XMLHttpRequest();
            xhr.open('GET', 'localize/' + lang + '/' + pageid, true);
            xhr.onload = function (e) {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        translationjson = JSON.parse(xhr.responseText);
                        console.log('%c[localize.js] Loaded translation data for page ' + pageid + ' in language ' + lang + '!', 'color: green;');
                        return true;
                    } else if (xhr.status === 404) {
                        console.error(xhr.statusText);
                    }
                }
            };
            xhr.onerror = function (e) {
                console.error(xhr.statusText);
            };
            xhr.send(null);
        }

        initlocalize(1);
    </script>
