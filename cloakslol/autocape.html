<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autocape</title>
    <link rel="icon" type="image/x-icon" href="https://slashonline.net/media/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <meta name="description" content="Automatic cape Generator">
    <meta name="keywords" content="Minecraft, Cape, Generator, Automatic, Free, 1.16, 1.15, 1.14, 1.13, 1.12, 1.11, 1.10, 1.9, 1.8, 1.7, 1.6, 1.5, 1.4, 1.3, 1.2, 1.1, 1.0">
    <style>
        body {
            background-color: #252526;
            color: #fff;
            font-family: 'popins', sans-serif;
            
        }
        .headder{
            height: 80px;
            width: calc(100% - 30px);
            margin: 15px;
            background-color: #1d1d1d;
            border-radius: 12px;
            padding: 0px;
        }
        .logo{
            margin-top: 15px;
            height: 100%;
            display: inline-block;
            margin-left: 20px;
        }
        .textsegement{
            height: 50px;
            display: inline-block;
            margin-left: 20px;
            font-size: 15px;
            
        }
        .page {
            width: calc(100% - 50px);
            margin: 15px;
            background-color: #1d1d1d;
            padding: 10px;
            border-radius: 12px;
        }
        .welcometext {
            font-size: 30px;
            margin: auto;
            text-align: center;

            

        }
        input[type="file"] {
        display: none;
        }
        .imageselector {
            margin: auto;
            display: block;
            margin-top: 20px;
            width: 500px;
            height: 50px;
        }
        .custom-file-upload {
            margin: auto;
            display: block;
            margin-top: 20px;
            width: 500px;
            height: 50px;
            background-color: #272727;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            font-size: 20px;
            cursor: pointer;
        }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
    </style>
</head>
<body>
    <div class="headder">
        <div class="logo">
            <a href="https://dev.cloaks.lol/autocape">
            <img src="https://slashonline.net/media/autocape.png" alt="Cloaks.lol Logo" height="50">
        </a>
        </div>
        
    </div>
    <div class="page">
        <div class="welcometext">
            Welcome to Autocape!
            Start by selecting an image
        </div>
        <label class="custom-file-upload" id="uisw">
            <div id="uploadingtext" style="visibility: hidden;">Uploading...</div>
            <div id="uploadingtextb" >Click here to selct a File</div>
        <input class="imageselector" id="selectors" type="file" accept="image/png, image/jpeg">
        </label>
    </div>

    <script>
        const uis = document.getElementById("uisw");
        const uist = document.getElementById("uploadingtext");
        const uistb = document.getElementById("uploadingtextb");
        const inputElement = document.getElementById("selectors");
        inputElement.addEventListener("change", handleFiles, false);

       

        function handleFiles() {
            const fileList = this.files; /* now you can work with the file list */
            console.log(fileList);
            uist.style.visibility = "visible";
            uistb.style.visibility = "hidden";
            uist.innerHTML = "Uploading...";
            uist.style.color = "white";

            //check if there even is a file
            if(fileList.length == 0){
                
                uist.style.visibility = "visible";
                uistb.style.visibility = "visible";
                uist.innerHTML = "No file selected!";
                uist.style.color = "red";
                uist.style.animation = "shake 0.5s";
                return;
            }
            //check if file is under 3mb
            if(fileList[0].size > 3000000){
                
                uist.style.visibility = "visible";
                uistb.style.visibility = "visible";
                uist.innerHTML = "File is too big! (Max 3MB)";
                uist.style.color = "red";
                uist.style.animation = "shake 0.5s";
                return;
            }

            //check if file is jpg
             if(fileList[0].type == "image/png" || fileList[0].type == "image/jpeg"){
                bombimage = fileList[0];
                
            }
            else{
                
                uist.style.visibility = "visible";
                uistb.style.visibility = "visible";
                uist.innerHTML = "File is not a png or jpg!";
                uist.style.color = "red";
                uist.style.animation = "shake 0.5s";
                return;
            }
        
            //upload file as form data
            var formData = new FormData();
            formData.append("file", fileList[0]);
            var request = new XMLHttpRequest();
            request.open("POST", "http://media.cloaks.lol/upload");
            console.log(formData);
            request.send(formData);
            request.onreadystatechange = function() {
                if (this.readyState == 4 && this.status == 200) {
                    console.log(this.responseText);
                    var response = JSON.parse(this.responseText);
                    var path = response.path;
                    if(this.status == 200){
                        uist.style.visibility = "visible";
                        uistb.style.visibility = "hidden";
                        uist.innerHTML = "Success!";
                        uist.style.color = "green";
                        uist.style.animation = "none";
                        newlocation = "https://dev.cloaks.lol/makecape?img=" + "https://dev.cloaks.lol/media/" + path;
                        window.location.href = newlocation;
                    }else{
                        uist.style.visibility = "visible";
                        uistb.style.visibility = "visible";
                        uist.innerHTML = "Error! " + this.responseText;
                        uist.style.color = "red";
                        uist.style.animation = "shake 0.5s";
                    }
                }
            };


            
        }
    </script>
</body>
</html>
