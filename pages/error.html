<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autocape - Error</title>
    <link rel="icon" type="image/x-icon" href="https://slashonline.net/media/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://bs-community.github.io/skinview3d/js/skinview3d.bundle.js"></script>
    <meta name="description" content="Autocape Error | Automatic cape Generator">
    <meta property="og:title" content="Autocape Error" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="http://autocape.app" />
    <meta property="og:image" content="{{imgurl}}" />
    <meta property="og:description" content="An error occurred while generating your cape" />
    <meta name="theme-color" content="#c400fa">
    <meta name="twitter:card" content="summary_large_image">
    <style>
        * { font-family: Poppins, system-ui, sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-[linear-gradient(73deg,#04031A_0%,#050242_100%)] m-0 text-white">
    <div class="headder border-b border-white/15 bg-linear-to-r from-white/6 to-transparent bg-[rgba(255,255,255,0.05)] backdrop-blur-xl h-20 flex items-center px-4 select-none">
        <div class="goback top-9 sm:top-8 left-5 sm:left-7 text-white/40 select-none cursor-pointer absolute flex items-center justify-center gap-4 opacity-80 hover:opacity-100 transition-all">
            <div>
                <svg xmlns="http://www.w3.org/2000/svg" width="9" height="16" viewBox="0 0 9 16" fill="none"><path d="M0.360901 7.29289C-0.029623 7.68342 -0.029623 8.31658 0.360901 8.70711L6.72486 15.0711C7.11539 15.4616 7.74855 15.4616 8.13908 15.0711C8.5296 14.6805 8.5296 14.0474 8.13908 13.6569L2.48222 8L8.13908 2.34315C8.5296 1.95262 8.5296 1.31946 8.13908 0.928932C7.74855 0.538408 7.11539 0.538408 6.72486 0.928932L0.360901 7.29289ZM2.0694 7H1.06801L1.06801 9H2.0694V7Z" fill="white" fill-opacity="0.39"/></svg>
            </div>
            <div class="hidden sm:block text-sm mt-px">Go Back</div>
        </div>

        <div class="mx-auto">
            <img src="https://media.autocape.app/media/n7leGMmIzGlOloDzB4X580ECB1783358474181/iGZHfHlfNs3376.png" alt="Autocape Logo" class="h-10 object-contain">
        </div>
    </div>
    <main class="mx-4 mt-6 rounded-[17px] p-6 min-h-[calc(100vh-150px)] flex flex-col items-center justify-center gap-6 text-center w-full max-w-3xl mx-auto">
        <div class="flex flex-col items-center justify-center p-6 border border-white/10 bg-white/6 rounded-2xl backdrop-blur-xl gap-4">
            <div class="text-xl text-white font-bold flex flex-col gap-2 items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-heart-broken"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M19.5 12.572l-7.5 7.428l-7.5 -7.428a5 5 0 1 1 7.5 -6.566a5 5 0 1 1 7.5 6.572" /><path d="M12 6l-2 4l4 3l-2 4v3" /></svg>
                Something went wrong.
            </div>
            <div class="text-base font-semibold text-white/60 flex flex-col gap-2">
                {{error}}
                <span class="text-sm text-white/30">Code: {{errorid}}</span>
            </div>
        </div>
    </main>

    <script>
        gobackbtn = document.getElementsByClassName("goback")[0];
        gobackbtn.addEventListener('click', () => {
            window.location.href = "/";
        });
    </script>
</body>
</html>
