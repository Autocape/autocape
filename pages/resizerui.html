<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autocape - Resize</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="icon" type="image/x-icon" href="https://slashonline.net/media/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@700&family=Montserrat:wght@300&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/themes/monolith.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/pickr.min.js"></script>
    <script src="https://bs-community.github.io/skinview3d/js/skinview3d.bundle.js"></script>

    <style>
        * { 
            font-family: Poppins, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        html {
            background: #04031A;
        }

        /* minimal required styles for third-party components and animations */
        .cropper-container { border-radius: 8px; }
        .cropper-bg { background-image: none; }
        .cropper-modal { background: rgba(0,0,0,0.67); border-radius: 8px; }

        @keyframes fadeout { from { opacity: 1 } to { opacity: 0 } }
    </style>
</head>

<body class="bg-linear-to-br from-[#04031A] to-[#050242] min-h-screen m-0 font-sans text-white">
    <div class="headder border-b border-white/15 bg-linear-to-r from-white/6 to-transparent bg-[rgba(255,255,255,0.05)] backdrop-blur-xl h-20 flex items-center px-4 select-none">
        <div class="goback top-9 sm:top-8 left-5 sm:left-7 text-white/40 select-none cursor-pointer absolute flex items-center justify-center gap-4 opacity-80 hover:opacity-100 transition-all">
            <div>
                <svg xmlns="http://www.w3.org/2000/svg" width="9" height="16" viewBox="0 0 9 16" fill="none"><path d="M0.360901 7.29289C-0.029623 7.68342 -0.029623 8.31658 0.360901 8.70711L6.72486 15.0711C7.11539 15.4616 7.74855 15.4616 8.13908 15.0711C8.5296 14.6805 8.5296 14.0474 8.13908 13.6569L2.48222 8L8.13908 2.34315C8.5296 1.95262 8.5296 1.31946 8.13908 0.928932C7.74855 0.538408 7.11539 0.538408 6.72486 0.928932L0.360901 7.29289ZM2.0694 7H1.06801L1.06801 9H2.0694V7Z" fill="white" fill-opacity="0.39"/></svg>
            </div>
            <div class="hidden sm:block text-sm mt-px">Go Back</div>
        </div>

        <div class="mx-auto">
            <img src="https://media.autocape.app/media/n7leGMmIzGlOloDzB4X580ECB1783358474181/iGZHfHlfNs3376.png" alt="Autocape Logo" class="h-10 object-contain">
        </div>
    </div>

    <main class="py-5 mx-4 flex flex-col sm:flex-row gap-4 sm:h-[calc(100vh-82px)] items-center justify-center">
        <!-- left: resize/crop area -->
        <section class="resizecontainer rounded-lg border border-white/15 bg-white/6 backdrop-blur-xl p-3 flex flex-col w-full h-full">
            <div id="loadingoverlay" class="loadingoverlay absolute inset-0 rounded-lg z-10002 flex items-center justify-center bg-linear-to-br from-[#04031A] to-[#050242]" style="visibility: visible;">
                <div class="loadingoverlaytext text-white text-lg font-bold">Loading...</div>
            </div>

            <div class="resizeimgtagcontainer flex-1 rounded-md overflow-hidden">
                <img id="imagh" src="" alt="To resize" class="w-full h-full object-contain rounded-md">
            </div>
        </section>

        <!-- right: preview + controls -->
        <aside class="previewcontainer md:w-1/4 flex flex-col gap-4">
            <h3 class="previewcontainerheadline text-center text-white text-xl font-bold">Preview</h3>
            <div class="livepreview relative w-full rounded-md bg-white/6 backdrop-blur-xl flex items-center justify-center" style="min-height:200px">
                <canvas id="skin_container" class="w-full h-full"></canvas>

                <div class="disabledpreview absolute inset-0 rounded-md bg-linear-to-br from-[#04031A] to-[#050242] backdrop-blur-lg z-10001 flex flex-col justify-center items-center text-white" style="visibility:hidden">
                    <div class="disabledpreviewtext font-bold">Preview was disabled.</div>
                    <div class="disabledpreviewtextreson">Reason: Your device seems to be too underpowered to run the 3D Preview (too many skipped render frames).</div>
                </div>
            </div>

            <div class="prbtns flex flex-col gap-3">
                <button class="autocapebutton donebtn rounded-lg border border-white/20 bg-green-500/20 hover:bg-green-500/25 h-14 flex items-center justify-center text-white text-lg font-bold shadow-sm hover:scale-102 transition-all cursor-pointer">Continue</button>

                <div class="colourmatchingtextandbutton flex flex-col gap-3">
                    <div class="colourmatchselectiontext text-center text-white font-bold">Colour matching mode:</div>
                    <div class="autocapebutton notopmarginbtn flex flex-col gap-2 select-none">
                        <div id="automaticcolourpickerselect" class="colourpickerselect [.colpickselenabled]:bg-blue-400/25 transition-all cursor-pointer colpickselenabled rounded-lg border border-white/20 bg-white/6 h-14 flex items-center justify-center text-white font-bold hover:not-focus:scale-102">Automatic</div>
                        <div id="customcolourpickerselect" class="colourpickerselect [.colpickselenabled]:bg-blue-400/25 transition-all cursor-pointer rounded-lg border border-white/20 bg-white/6 h-14 flex items-center justify-between px-4 hover:scale-102">
                            <div class="customtext text-white font-bold">Custom</div>
                            <input type="color" id="customcolourpicker" class="colourpicker w-10 h-8" />
                        </div>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <script>
        gobackbtn = document.getElementsByClassName("goback")[0];
        gobackbtn.addEventListener('click', () => { window.location.href = "/"; });
    </script>

    <script>
        var countdown = 0;
        var isrendered = false;
        var isrenderingrn = false;
        var skippedframes = 0;
        var renderingenbaled = true;

        var image = document.getElementById('imagh');
        var colpop = document.getElementById('colpop');
        var popuppickprevimg = document.getElementById('popuppickprevimg');
        const queryString = window.location.search;
        const urlParams = new URLSearchParams(queryString);
        const imgsa = urlParams.get('img');
        const stateid = urlParams.get('stateid');
        var isstate = false;
        const loadingcontainer = document.getElementById('loadingoverlay');
        const pcrapp = document.getElementsByClassName('pcr-app')[0];

        const donebtn = document.getElementsByClassName('donebtn')[0];
        var doneclicked = false;

        var selectedmatchmode = "automatic";

        const automaticcolourpickerselect = document.getElementById('automaticcolourpickerselect');
        const customcolourpickerselect = document.getElementById('customcolourpickerselect');

        automaticcolourpickerselect.addEventListener('click', () => {
            selectedmatchmode = "automatic";
            automaticcolourpickerselect.classList.add('colpickselenabled');
            customcolourpickerselect.classList.remove('colpickselenabled');
        });

        customcolourpickerselect.addEventListener('click', () => {
            selectedmatchmode = "custom";
            automaticcolourpickerselect.classList.remove('colpickselenabled');
            customcolourpickerselect.classList.add('colpickselenabled');
        });

        donebtn.addEventListener("click", function(){
            if (doneclicked == true) return;
            donebtn.innerHTML = '<img src="https://raw.githubusercontent.com/n3r4zzurr0/svg-spinners/main/preview/90-ring-white-36.svg" height="30px"></img>';
            donebtn.disabled = true;
            doneclicked = true;

            if (selectedmatchmode == "automatic") {
                colourmatch = "true";
            } else {
                colourmatch = "custom&customcolour=" + document.getElementById('customcolourpicker').value.replace("#", "");
            }

            const canvass = (cropper && typeof cropper.getCroppedCanvas === 'function') ? cropper.getCroppedCanvas() : null;
            if (!canvass) {
                console.error('Could not get cropped canvas');
                alert('Unable to read the cropped image. Please try again.');
                donebtn.disabled = false;
                donebtn.innerHTML = 'Done';
                doneclicked = false;
                return;
            }
            canvass.toBlob(function(blob) {
                var xhr = new XMLHttpRequest();
                xhr.open("POST", "https://media.autocape.app/upload", true);
                FormDatas = new FormData();
                FormDatas.append("file", blob, "img.png");
                xhr.send(FormDatas);
                xhr.onreadystatechange = function() {
                    if (xhr.readyState == 4 && xhr.status == 200) {
                        jsonsa = JSON.parse(xhr.responseText);
                        if (isstate == true) {
                            const idxhr = new XMLHttpRequest();
                            idxhr.open("GET", "/makecape?fromeditor=true&stateid="+ stateid +"&colourmatch=" + colourmatch + "&img=https://media.autocape.app/media/" + jsonsa.path, true);
                            idxhr.send();
                            idxhr.onreadystatechange = function() {
                                if (idxhr.readyState == 4 && idxhr.status == 200) {
                                    const resultjson = JSON.parse(idxhr.responseText);
                                    if (resultjson.resultid != null) window.location.href = "/result/" + resultjson.resultid;
                                } else if(idxhr.readyState == 4) {
                                    const resultjson = JSON.parse(idxhr.responseText)
                                    if(resultjson.err) {
                                        console.log(resultjson)
                                        alert('Something went wrong while submitting your cape.')
                                        return;
                                    }
                                }
                            }
                        } else {
                            const idxhr = new XMLHttpRequest();
                            idxhr.open("GET", "/makecape?fromeditor=true&colourmatch=" + colourmatch + "&img=https://media.autocape.app/media/" + jsonsa.path, true);
                            idxhr.send();
                            idxhr.onreadystatechange = function() {
                                if (idxhr.readyState == 4 && idxhr.status == 200) {
                                    const resultjson = JSON.parse(idxhr.responseText);
                                    if (resultjson.resultid != null) window.location.href = "/result/" + resultjson.resultid;
                                } else if(idxhr.readyState == 4) {
                                    const resultjson = JSON.parse(idxhr.responseText)
                                    if(resultjson.err) {
                                        console.log(resultjson)
                                        alert('Something went wrong while submitting your cape.')
                                        return;
                                    }
                                }
                            }
                        }
                    }
                    if (xhr.readyState == 4 && xhr.status != 200) {
                        alert("Processed image file exceeds 3MB file size limit, please try using a smaller image file.");
                        donebtn.innerHTML = 'error';
                        donebtn.disabled = true;
                    }
                }
            });
        })

        function resizedwindow() {
            var calcedwith = livepreviewdiv.offsetWidth;
            var calcedheight = livepreviewdiv.offsetWidth;
            livepreviewdiv.height = calcedheight;
            skinViewer.width = calcedwith;
            skinViewer.height = calcedheight;
        }

        window.addEventListener('resize', resizedwindow);

        function doneloading() {
            loadingcontainer.style.animation = "fadeout 100ms ease-in-out forwards";
            setTimeout(() => { loadingcontainer.style.visibility = "hidden"; }, 110);
        }

        if (stateid != null) isstate = true;

        image.src = imgsa;

        var cropper = new Cropper(image, { aspectRatio: 5/8, crop(event) { widths = event.detail.width; heights = event.detail.height; countdown = 1; isrendered = false; }, });
        var canvas = document.createElement('canvas');
        canvas.width = 2048; canvas.height = 1024; var ctx = canvas.getContext('2d');

        var image = new Image(); image.crossOrigin = "Anonymous"; image.src = "https://autocape.app/media/previews/previewtexture.png";
        image.onload = function() { ctx.drawImage(image, 0, 0, 2048, 1024); }

        function renderpreviewcapefile() { /* original rendering code preserved */
            if (isrendered) return;
            if (countdown > 0) { countdown--; return; }
            if (isrenderingrn) { skippedframes++; return; }

            if (!cropper || typeof cropper.getCroppedCanvas !== 'function') return;

            isrenderingrn = true;
            isrendered = true;
            const canvass = cropper.getCroppedCanvas();
            if (!canvass) {
                console.warn('cropper.getCroppedCanvas() returned null');
                isrenderingrn = false;
                return;
            }

            try {
                canvass.toBlob(function(blob) {
                    var img = new Image();
                    var imgsourceurl = URL.createObjectURL(blob);
                    img.src = imgsourceurl;
                    img.onload = function() {
                        ctx.fillStyle = 'black';
                        ctx.fillRect(32,32,320,512);
                        ctx.drawImage(img,32,32,320,512);
                        canvas.toBlob(function(resultBlob) {
                            var bloburl = URL.createObjectURL(resultBlob);
                            if (typeof skinViewer !== 'undefined' && skinViewer && typeof skinViewer.loadCape === 'function') {
                                skinViewer.loadCape(bloburl);
                            }
                            isrenderingrn = false;
                            skippedframes = 0;
                            doneloading();
                            try { URL.revokeObjectURL(imgsourceurl); } catch(e) { console.error(e); }
                            img = null;
                        }, 'image/png');
                    };
                });
            } catch (error) {
                console.error(error);
                isrenderingrn = false;
            }
        }

        setInterval(() => { if (renderingenbaled == true) { if (skippedframes < 10) renderpreviewcapefile(); else disablerendering(); } }, 100);
        const livepreviewdiv = document.getElementsByClassName('livepreview')[0];
        const skincontainer = document.getElementById('skin_container');

        function disablerendering(reason) { isrendered = true; renderingenbaled = false; canvas = null; skincontainer.remove(); }

        const calcedwith = livepreviewdiv.offsetWidth; const calcedheight = livepreviewdiv.offsetWidth; livepreviewdiv.height = calcedheight;

        let skinViewer = new skinview3d.SkinViewer({ canvas: document.getElementById('skin_container'), width: calcedwith, height: calcedheight, skin: "https://mineskin.eu/skin/Felixmax_" });
        skinViewer.camera.rotation.z = -3; skinViewer.camera.rotation.y = 0; skinViewer.camera.rotation.x = -2; skinViewer.camera.position.z = -33; skinViewer.camera.position.y = 8; skinViewer.camera.position.x = -1; skinViewer.fov = 65; skinViewer.animation = new skinview3d.IdleAnimation();

        document.addEventListener('keydown', function(event) { if (event.keyCode == 83) { var script=document.createElement('script');script.onload=function(){var stats=new Stats();document.body.appendChild(stats.dom);requestAnimationFrame(function loop(){stats.update();requestAnimationFrame(loop)});};script.src='https://mrdoob.github.io/stats.js/build/stats.min.js';document.head.appendChild(script); } if (event.keyCode == 80) { document.body.style.background = "pink"; alert("femboy mode activated") } });
    </script>
</body>
</html>
